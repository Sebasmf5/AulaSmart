spring.application.name=usuarios-service

app.version = 0.4.0
app.api.version=v1
server.port=8080

management.server.port=8081
management.endpoints.web.exposure.include=*

# Configuracion de la base de datos
spring.datasource.url=jdbc:postgresql://localhost:5432/aulaSmartTest
spring.datasource.username=dev
spring.datasource.password=a1b2c3d4
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true

# Configuración de JWT para AulaSmart
application.security.jwt.secret-key=${JWT_SECRET_KEY}
# Duración del token de acceso (1 día en milisegundos: 86400000)
application.security.jwt.expiration=86400000
# Duración del token de refresco (7 días: 604800000)
application.security.jwt.refresh-token.expiration=604800000

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


spring.main.allow-circular-references=true

spring.datasource.hikari.maximum-pool-size=50

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

spring.datasource.hikari.minimum-idle=10

spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.connection-test-query=SELECT 1

logging.level.org.springframework=ERROR

logging.level.web=INFO

logging.level.org.hibernate.SQL=DEBUG

logging.level.root=ERROR
logging.level.com.zaxxer.hikari=ERROR
logging.level.org.hibernate=ERROR